spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      enable-idempotence: true
      linger-ms: 5
      retries: 10
    consumer:
      group-id: saga-platform
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
platform:
  event:
    outbox:
      source-service: saga-platform
      batch-size: 50
      fixed-delay-ms: 3000
      max-attempts: 5
